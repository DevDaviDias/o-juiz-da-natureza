<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoScan IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e0a; --surface: #111611; --border: #1e2a1e; --muted: #3a4a3a;
      --text: #e8f0e8; --text-dim: #6b806b; --green: #4ade80; --green-glow: rgba(74,222,128,0.15);
      --plastico: #ef4444; --plastico-glow: rgba(239,68,68,0.2);
      --papel: #3b82f6; --papel-glow: rgba(59,130,246,0.2);
      --vidro: #06b6d4; --vidro-glow: rgba(6,182,212,0.2);
      --metal: #a855f7; --metal-glow: rgba(168,85,247,0.2);
      --neutro: #555f55; --neutro-glow: rgba(85,95,85,0.1);
    }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px; opacity: 0.4; pointer-events: none; z-index: 0;
    }
    .blob { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; transition: background 1.5s ease, opacity 1.5s ease; }
    .blob-1 { width: 500px; height: 500px; top: -100px; left: -150px; background: var(--green-glow); opacity: 0.6; }
    .blob-2 { width: 400px; height: 400px; bottom: -80px; right: -100px; background: var(--green-glow); opacity: 0.4; }
    .app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 40px; height: 40px; border: 2px solid var(--green); border-radius: 10px; display: grid; place-items: center; font-size: 20px; }
    .logo-text { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span { color: var(--green); }
    .badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--green); background: var(--green-glow); border: 1px solid rgba(74,222,128,0.3); padding: 4px 10px; border-radius: 100px; letter-spacing: 1px; }
    .main-grid { display: grid; grid-template-columns: 1fr 360px; gap: 20px; align-items: start; }
    @media (max-width: 720px) { .main-grid { grid-template-columns: 1fr; } }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
    .panel-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .panel-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .panel-title { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
    .webcam-area { position: relative; aspect-ratio: 4/3; background: #070a07; display: flex; align-items: center; justify-content: center; }
    .webcam-area canvas { width: 100% !important; height: 100% !important; object-fit: cover; display: block; }
    .webcam-placeholder { display: flex; flex-direction: column; align-items: center; gap: 16px; color: var(--muted); text-align: center; padding: 40px; }
    .webcam-placeholder svg { opacity: 0.3; }
    .webcam-placeholder p { font-size: 13px; font-family: 'DM Mono', monospace; }
    .corner { position: absolute; width: 24px; height: 24px; border-color: var(--green); border-style: solid; opacity: 0.5; }
    .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
    .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
    .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }
    .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--green), transparent); opacity: 0; pointer-events: none; }
    .scanning .scan-line { animation: scan 2s linear infinite; opacity: 0.7; }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    /* CHEAT OVERLAY */
    .cheat-overlay {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(10,14,10,0.85); z-index: 10; flex-direction: column; gap: 8px;
    }
    .cheat-overlay.active { display: flex; }
    .cheat-emoji { font-size: 64px; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    .cheat-label { font-size: 28px; font-weight: 800; animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    .cheat-tag { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 2px; margin-top: 4px; }
    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .start-btn { margin: 20px; width: calc(100% - 40px); padding: 16px; background: var(--green); color: #0a0e0a; border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(74,222,128,0.3); }
    .start-btn:active { transform: translateY(0); }
    .start-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .result-card { margin: 0 20px 20px; border: 1px solid var(--border); border-radius: 14px; padding: 20px; transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1); background: transparent; }
    .result-card.active { border-color: var(--active-color, var(--green)); background: var(--active-glow, var(--green-glow)); box-shadow: 0 0 40px var(--active-glow, var(--green-glow)); }
    .result-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    .result-class { font-size: 32px; font-weight: 800; letter-spacing: -1px; transition: color 0.5s; min-height: 40px; }
    .result-confidence { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-dim); margin-top: 4px; }
    .confidence-bar-wrap { margin-top: 12px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .confidence-bar { height: 100%; border-radius: 2px; transition: width 0.4s ease, background 0.5s; background: var(--green); width: 0%; }
    .classes-list { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .class-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); transition: all 0.4s; }
    .class-item.active-item { border-color: var(--item-color); background: var(--item-glow); transform: translateX(4px); }
    .class-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--border); display: grid; place-items: center; font-size: 18px; flex-shrink: 0; transition: background 0.4s; }
    .class-item.active-item .class-icon { background: var(--item-glow); }
    .class-info { flex: 1; min-width: 0; }
    .class-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; transition: color 0.4s; }
    .class-item.active-item .class-name { color: var(--item-color); }
    .class-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .class-bar { height: 100%; border-radius: 2px; width: 0%; transition: width 0.4s ease; }
    .class-pct { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim); flex-shrink: 0; min-width: 38px; text-align: right; transition: color 0.4s; }
    .class-item.active-item .class-pct { color: var(--item-color); }
    .stats-bar { margin-top: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; text-align: center; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--green); letter-spacing: -1px; }
    .stat-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-top: 4px; text-transform: uppercase; }
    .history-panel { margin-top: 20px; }
    .history-list { padding: 12px 20px 20px; display: flex; flex-wrap: wrap; gap: 8px; }
    .history-chip { font-family: 'DM Mono', monospace; font-size: 11px; padding: 4px 10px; border-radius: 100px; border: 1px solid; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    .no-history { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-dim); padding: 0 0 16px; text-align: center; }
    .fps-badge { position: absolute; top: 12px; right: 48px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--green); background: rgba(10,14,10,0.8); border: 1px solid var(--border); padding: 2px 8px; border-radius: 4px; opacity: 0; transition: opacity 0.3s; }
    .fps-badge.visible { opacity: 1; }

    /* KEYBOARD HINT BAR */
    .key-hints { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 20px; border-top: 1px solid var(--border); }
    .key-hint { font-family: 'DM Mono', monospace; font-size: 10px; display: flex; align-items: center; gap: 5px; color: var(--text-dim); }
    .key { display: inline-block; background: var(--border); border: 1px solid var(--muted); border-radius: 4px; padding: 1px 6px; font-size: 11px; color: var(--text); }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="blob blob-1" id="blob1"></div>
  <div class="blob blob-2" id="blob2"></div>
  <div class="app">
    <header>
      <div class="logo">
        <div class="logo-icon">♻️</div>
        <div class="logo-text">Eco<span>Scan</span></div>
      </div>
      <div class="badge">IA v1.0</div>
    </header>

    <div class="main-grid">
      <div>
        <div class="panel">
          <div class="panel-header">
            <div class="panel-dot" id="statusDot"></div>
            <span class="panel-title" id="statusLabel">aguardando</span>
          </div>

          <div class="webcam-area" id="webcamArea">
            <div class="webcam-placeholder" id="placeholder">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
              <p>câmera inativa</p>
            </div>
            <div id="webcam-container" style="width:100%;height:100%;display:none;"></div>

            <!-- CHEAT OVERLAY -->
            <div class="cheat-overlay" id="cheatOverlay">
              <div class="cheat-emoji" id="cheatEmoji"></div>
              <div class="cheat-label" id="cheatLabel"></div>
              <div class="cheat-tag">TRAPAÇA ATIVADA</div>
            </div>

            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            <div class="scan-line" id="scanLine"></div>
            <div class="fps-badge" id="fpsBadge">-- fps</div>
          </div>

          <!-- KEY HINTS -->
          <div class="key-hints">
            <span class="key-hint"><span class="key">1</span> Papel</span>
            <span class="key-hint"><span class="key">2</span> Vidro</span>
            <span class="key-hint"><span class="key">3</span> Plástico</span>
            <span class="key-hint"><span class="key">4</span> Metal</span>
            <span class="key-hint"><span class="key">0</span> limpar</span>
          </div>

          <button class="start-btn" onclick="init()" id="startBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            Iniciar Classificação
          </button>

          <div class="result-card" id="resultCard">
            <div class="result-label">Classificação detectada</div>
            <div class="result-class" id="resultClass">—</div>
            <div class="result-confidence" id="resultConf">aguardando câmera...</div>
            <div class="confidence-bar-wrap">
              <div class="confidence-bar" id="confBar"></div>
            </div>
          </div>
        </div>

        <div class="stats-bar">
          <div class="stat"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Detecções</div></div>
          <div class="stat"><div class="stat-value" id="statDom">—</div><div class="stat-label">Mais visto</div></div>
          <div class="stat"><div class="stat-value" id="statConf">0%</div><div class="stat-label">Confiança</div></div>
        </div>
      </div>

      <div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">probabilidades</span></div>
          <div class="classes-list" id="classesList">
            <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--text-dim);text-align:center;padding:20px 0;">inicie a câmera para ver</div>
          </div>
        </div>
        <div class="panel history-panel">
          <div class="panel-header"><span class="panel-title">histórico</span></div>
          <div class="history-list" id="historyList">
            <div class="no-history" style="width:100%">nenhum registro ainda</div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/MrsCU_L3X/";

const classes = {
  "papel":    { emoji: "📄", label: "Papel",    color: "#3b82f6", glow: "rgba(59,130,246,0.15)" },
  "vidro":    { emoji: "🫙", label: "Vidro",    color: "#06b6d4", glow: "rgba(6,182,212,0.15)"  },
  "plastico": { emoji: "🧴", label: "Plástico", color: "#ef4444", glow: "rgba(239,68,68,0.15)"  },
  "metal":    { emoji: "🔩", label: "Metal",    color: "#a855f7", glow: "rgba(168,85,247,0.15)" }
};

const keyMap = { "1": "papel", "2": "vidro", "3": "plastico", "4": "metal" };

let model, webcam;
let isRunning = false;
let detections = 0, domCount = {}, lastClass = null, frameCount = 0, lastFpsTime = Date.now(), avgConf = 0;
let cheatTimeout = null;
let cheatActive = false;

document.addEventListener("keydown", function(e) {
  if (e.key === "0") { clearCheat(); return; }
  const key = keyMap[e.key];
  if (!key) return;
  const info = classes[key];
  activateCheat(key, info, 99);
});

function activateCheat(key, info, pct) {
  cheatActive = true;
  const overlay = document.getElementById("cheatOverlay");
  document.getElementById("cheatEmoji").textContent = info.emoji;
  document.getElementById("cheatLabel").textContent = info.label;
  document.getElementById("cheatLabel").style.color = info.color;
  overlay.classList.add("active");
  applyDetection(key, info, pct, true);
  if (cheatTimeout) clearTimeout(cheatTimeout);
  cheatTimeout = setTimeout(clearCheat, 4000);
}

function clearCheat() {
  cheatActive = false;
  document.getElementById("cheatOverlay").classList.remove("active");
}

async function init() {
  const btn = document.getElementById("startBtn");
  btn.disabled = true;
  btn.innerHTML = `<span style="animation:spin 1s linear infinite;display:inline-block">⟳</span> Carregando modelo...`;
  try {
    model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
    webcam = new tmImage.Webcam(640, 480, true);
    await webcam.setup();
    await webcam.play();
    document.getElementById("placeholder").style.display = "none";
    const wc = document.getElementById("webcam-container");
    wc.style.display = "block";
    wc.appendChild(webcam.canvas);
    document.getElementById("webcamArea").classList.add("scanning");
    document.getElementById("statusLabel").textContent = "ativo";
    document.getElementById("statusDot").style.background = "#4ade80";
    document.getElementById("fpsBadge").classList.add("visible");
    buildClassList();
    btn.innerHTML = `⏹ Câmera ativa`;
    btn.style.background = "#1e2a1e";
    btn.style.color = "#4ade80";
    btn.style.border = "1px solid rgba(74,222,128,0.3)";
    isRunning = true;
    window.requestAnimationFrame(loop);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = `▶ Iniciar Classificação`;
    alert("Erro ao carregar modelo: " + e.message);
  }
}

function buildClassList() {
  const el = document.getElementById("classesList");
  el.innerHTML = "";
  for (const [key, info] of Object.entries(classes)) {
    el.innerHTML += `
      <div class="class-item" id="item-${key}" style="--item-color:${info.color};--item-glow:${info.glow}">
        <div class="class-icon">${info.emoji}</div>
        <div class="class-info">
          <div class="class-name">${info.label}</div>
          <div class="class-bar-wrap"><div class="class-bar" id="bar-${key}" style="background:${info.color}"></div></div>
        </div>
        <div class="class-pct" id="pct-${key}">0%</div>
      </div>`;
  }
}

async function loop() {
  if (!isRunning) return;
  webcam.update();
  if (!cheatActive) await predict();
  frameCount++;
  const now = Date.now();
  if (now - lastFpsTime >= 1000) {
    document.getElementById("fpsBadge").textContent = frameCount + " fps";
    frameCount = 0; lastFpsTime = now;
  }
  window.requestAnimationFrame(loop);
}

async function predict() {
  const prediction = await model.predict(webcam.canvas);
  let top = prediction[0];
  prediction.forEach(p => { if (p.probability > top.probability) top = p; });
  const key = top.className.toLowerCase();
  const pct = Math.round(top.probability * 100);
  const info = classes[key] || { label: top.className, color: "#555f55", glow: "rgba(85,95,85,0.1)", emoji: "❓" };
  applyDetection(key, info, pct, false);
  prediction.forEach(p => {
    const k = p.className.toLowerCase();
    const v = Math.round(p.probability * 100);
    const barEl = document.getElementById("bar-" + k);
    const pctEl = document.getElementById("pct-" + k);
    const itemEl = document.getElementById("item-" + k);
    if (barEl) barEl.style.width = v + "%";
    if (pctEl) pctEl.textContent = v + "%";
    if (itemEl) itemEl.classList.toggle("active-item", k === key && pct > 30);
  });
}

function applyDetection(key, info, pct, isCheat) {
  const card = document.getElementById("resultCard");
  document.getElementById("resultClass").textContent = (info.emoji || "") + " " + (info.label || key);
  document.getElementById("resultClass").style.color = info.color;
  document.getElementById("resultConf").textContent = isCheat ? `trapaça ativada — confiança: ${pct}%` : `confiança: ${pct}%`;
  document.getElementById("confBar").style.width = pct + "%";
  document.getElementById("confBar").style.background = info.color;
  card.classList.add("active");
  card.style.setProperty("--active-color", info.color);
  card.style.setProperty("--active-glow", info.glow);
  document.getElementById("blob1").style.background = info.glow.replace("0.15", "0.6");
  document.getElementById("blob2").style.background = info.glow.replace("0.15", "0.3");

  if (isCheat) {
    for (const k of Object.keys(classes)) {
      const barEl = document.getElementById("bar-" + k);
      const pctEl = document.getElementById("pct-" + k);
      const itemEl = document.getElementById("item-" + k);
      const v = k === key ? 99 : Math.floor(Math.random() * 3);
      if (barEl) barEl.style.width = v + "%";
      if (pctEl) pctEl.textContent = v + "%";
      if (itemEl) itemEl.classList.toggle("active-item", k === key);
    }
  }

  detections++;
  domCount[key] = (domCount[key] || 0) + 1;
  avgConf = Math.round((avgConf + pct) / 2);
  document.getElementById("statTotal").textContent = detections;
  document.getElementById("statConf").textContent = avgConf + "%";
  const topDom = Object.entries(domCount).sort((a,b) => b[1]-a[1])[0];
  if (topDom) {
    const domInfo = classes[topDom[0]];
    document.getElementById("statDom").textContent = domInfo ? domInfo.emoji : topDom[0];
  }
  if ((key !== lastClass && pct > 55) || isCheat) {
    addHistory(info, key, pct);
    lastClass = key;
  }
}

let lastHistoryTime = 0;
function addHistory(info, key, pct) {
  const now = Date.now();
  if (now - lastHistoryTime < 3000) return;
  lastHistoryTime = now;
  const list = document.getElementById("historyList");
  const noH = list.querySelector(".no-history");
  if (noH) noH.remove();
  const chip = document.createElement("div");
  chip.className = "history-chip";
  chip.textContent = `${info.emoji || "?"} ${info.label || key} ${pct}%`;
  chip.style.borderColor = info.color;
  chip.style.color = info.color;
  chip.style.background = info.glow;
  list.prepend(chip);
  const chips = list.querySelectorAll(".history-chip");
  if (chips.length > 20) chips[chips.length - 1].remove();
}
</script>
</body>
</html>
